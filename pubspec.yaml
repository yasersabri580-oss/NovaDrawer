name: nova_drawer
description: >
  NovaDrawer – A modern, fully dynamic, and highly responsive
  app drawer component for Flutter supporting mobile, tablet, and desktop
  with 16+ animation types (including floating, wave, parallax, and curtain),
  nested menus, RTL, theming, accessibility, mini-drawer mode, gesture controls,
  search_plus-powered search, and background effects.
version: 1.0.0
homepage: https://github.com/yasersabri580-oss/NovaDrawer

environment:
  sdk: ^3.10.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  search_plus: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
